services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nas-api-postgres
    env_file:
      - ./.env.prod
    environment:
      POSTGRES_DB: nas_db
      POSTGRES_USER: nas_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U nas_user -d nas_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5433:5432" # Use 5433 to avoid conflict with local Postgres
    networks:
      - nas-network
      - agent-network

  redis:
    image: redis:7-alpine
    container_name: nas-api-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      - nas-network
      - agent-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: nas-api:1.0.0
    container_name: nas-api
    env_file:
      - ./.env.prod
    environment:
      PORT: 8080
      ENV: production
      GIN_MODE: release
      LOG_LEVEL: info
      NODE_ENV: production
      JWT_SECRET: "${JWT_SECRET}"
      MONITORING_TOKEN: "${MONITORING_TOKEN}"
      DATABASE_URL: "postgres://nas_user:${POSTGRES_PASSWORD}@postgres:5432/nas_db?sslmode=disable"
      REDIS_URL: "redis:6379"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      FRONTEND_URL: "${FRONTEND_URL}"
      EMAIL_FROM: "nas.ai@example.com"
      RATE_LIMIT_PER_MIN: 100
      # AI Service URL - connects to AI agent on host network
      AI_SERVICE_URL: "http://192.168.178.181:5000"
      # Ollama LLM for RAG
      OLLAMA_URL: "http://192.168.178.181:11434"
      LLM_MODEL: "qwen2.5:3b"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - nas_data:/mnt/data
      - nas_backups:/mnt/backups
    networks:
      - nas-network
      - agent-network

  webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
      # No VITE_API_BASE_URL build arg → uses relative URLs via nginx proxy
    image: nas-webui:1.0.0
    container_name: nas-webui
    env_file:
      - ./.env.prod
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_started
    ports:
      - "8080:80"
    networks:
      - nas-network

  monitoring:
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    image: nas-monitoring:1.0.0
    container_name: nas-monitoring
    env_file:
      - ./.env.prod
    environment:
      API_URL: "http://api:8080/api/v1/system/metrics"
      MONITORING_TOKEN: "${MONITORING_TOKEN}"
      AGENT_ID: "prod-agent"
      INTERVAL_SECONDS: 10
    depends_on:
      api:
        condition: service_started
    networks:
      - nas-network

  analysis-agent:
    build:
      context: ./analysis
      dockerfile: Dockerfile
    image: nas-analysis:1.0.0
    container_name: nas-analysis-agent
    env_file:
      - ./.env.prod
    environment:
      DATABASE_URL: "postgres://nas_user:${POSTGRES_PASSWORD}@postgres:5432/nas_db?sslmode=disable"
      INTERVAL_SECONDS: 10
      LOOKBACK_SECONDS: 60
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - nas-network

  pentester-agent:
    build:
      context: ./pentester
      dockerfile: Dockerfile
    image: nas-pentester:1.0.0
    container_name: nas-pentester-agent
    env_file:
      - ./.env.prod
    depends_on:
      api:
        condition: service_started
    networks:
      - agent-network
      - nas-network

  ai-knowledge-agent:
    build:
      context: ./ai_knowledge_agent
      dockerfile: Dockerfile
    image: nas-ai-knowledge-agent:1.0.0
    container_name: nas-ai-knowledge-agent
    network_mode: host # Direct access to localhost:11434 (Ollama)
    env_file:
      - ./.env.prod
    environment:
      # Database Configuration (use localhost since network_mode: host)
      PGHOST: 127.0.0.1
      PGPORT: 5433
      PGDATABASE: nas_db
      PGUSER: nas_user
      PGPASSWORD: "${POSTGRES_PASSWORD}"
      DB_POOL_MIN: 1
      DB_POOL_MAX: 10

      # AI Model Configuration - Ollama Embeddings (Raspberry Pi optimized)
      AI_MODEL_TYPE: ollama
      AI_MODEL_NAME: mxbai-embed-large
      OLLAMA_BASE_URL: http://localhost:11434
      EMBEDDING_DIM: 1024

      # Service Configuration
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: 5000
      DEBUG_MODE: "false"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - nas_data:/mnt/data
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 2g

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nas_data:
    driver: local
  nas_backups:
    driver: local

networks:
  nas-network:
    driver: bridge
  agent-network:
    driver: bridge
